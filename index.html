<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Story of Us ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

canvas{
    image-rendering:auto;
}

#message{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:15px;
    border-radius:10px;
    display:none;
    max-width:500px;
    font-family:Arial;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="message"></div>

<script>

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#e8e8e8',

    pixelArt: false,

    physics: {
        default: 'arcade'
    },

    scene: {
        preload,
        create,
        update
    }
};

const game = new Phaser.Game(config);

let player;
let cursors;
let star;

function preload() {

    // Your photo
    this.load.image('player', 'assets/girlfriend.png');

    // Yellow memory point
    let graphics = this.make.graphics({
        x: 0,
        y: 0,
        add: false
    });

    graphics.fillStyle(0xffff00);
    graphics.fillCircle(16,16,16);
    graphics.generateTexture('star',32,32);
}

function create() {

    this.add.text(
        220,
        20,
        'The Story of Us ❤️',
        {
            fontSize:'28px',
            color:'#000000'
        }
    );

    player = this.physics.add.sprite(
        100,
        300,
        'player'
    );

    // Resize photo
    player.displayHeight = 140;
    player.scaleX = player.scaleY;

    // First memory
    star = this.physics.add.sprite(
        600,
        300,
        'star'
    );

    cursors = this.input.keyboard.createCursorKeys();

    this.physics.add.overlap(
        player,
        star,
        showMemory,
        null,
        this
    );
}

function update() {

    player.setVelocity(0);

    if(cursors.left.isDown){
        player.setVelocityX(-200);
    }

    if(cursors.right.isDown){
        player.setVelocityX(200);
    }

    if(cursors.up.isDown){
        player.setVelocityY(-200);
    }

    if(cursors.down.isDown){
        player.setVelocityY(200);
    }
}

function showMemory(){

    const box = document.getElementById("message");

    box.style.display = "block";

    box.innerHTML = `
        <h2>❤️ First Memory</h2>

        <p>
        Here you can put a photo,
        a memory, or a message.
        </p>

        <p>
        "That day I didn't know
        you would become my favorite person."
        </p>
    `;

    star.destroy();
}

</script>

</body>
</html>
