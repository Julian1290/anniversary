<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Nuestra historia en un año ❤️</title>

<style>
body{
    margin:0;
    background:#ffb6c1;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
}

#game{
    position:relative;
    width:800px;
    height:600px;
    background:#ffe4ec;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255, 105, 180, 0.6);
}

#world{
    position:absolute;
    left:0;
    top:0;
    width:2000px;
    height:2200px;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.65) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.55) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.55) 0 2px, transparent 3px),
        #ffe4ec;
    transition:transform 0.08s linear;
}

h1{
    position:absolute;
    top:15px;
    left:0;
    width:100%;
    text-align:center;
    font-family:monospace;
    font-weight:normal;
    color:#5c1a35;
    z-index:50;
    pointer-events:none;
}

.path{
    position:absolute;
    width:10px;
    background:#ffc1d6;
    border-radius:20px;
    box-shadow:0 0 10px rgba(255,105,180,0.4);
}

#player{
    position:absolute;
    left:100px;
    top:260px;
    height:120px;
    width:auto;
    border-radius:15px;
    border:4px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.8);
    z-index:10;
}

.month{
    position:absolute;
    width:165px;
    min-height:62px;
    background:white;
    border:3px solid #ff6fa5;
    border-radius:16px;
    color:#5c1a35;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-weight:bold;
    box-shadow:0 0 15px rgba(255,105,180,0.45);
    animation:pulse 2s infinite;
    padding:6px;
    box-sizing:border-box;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

#message{
    position:absolute;
    top:55px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:18px;
    border-radius:15px;
    display:none;
    width:640px;
    max-height:465px;
    overflow:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    z-index:1000;
    color:#5c1a35;
    text-align:center;
}

.gallery{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:15px 0;
    flex-wrap:wrap;
}

.gallery img{
    width:160px;
    height:140px;
    object-fit:contain;

    border-radius:10px;
    border:3px solid #ffd6e7;

    background:#fff0f5;
}

#closeBtn{
    margin-top:10px;
    padding:10px 22px;
    border:none;
    border-radius:12px;
    background:#ff6fa5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#controls{
    position:absolute;
    bottom:20px;
    right:20px;
    display:grid;
    grid-template-columns:70px 70px 70px;
    gap:6px;
    z-index:999;
}

.control-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:15px;
    background:#ff6fa5;
    color:white;
    font-size:30px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    cursor:pointer;
}

.control-btn:active{
    transform:scale(0.95);
    background:#ff4f8f;
}

.empty{
    visibility:hidden;
}

#hint{
    position:absolute;
    bottom:20px;
    left:20px;
    color:#5c1a35;
    background:rgba(255,255,255,0.75);
    padding:10px 14px;
    border-radius:12px;
    z-index:60;
    font-size:14px;
}

@media (max-width:850px){
    #game{
        width:100vw;
        height:100vh;
        border-radius:0;
    }

    #message{
        width:85vw;
        max-height:70vh;
    }

    #controls{
        right:12px;
        bottom:12px;
        grid-template-columns:60px 60px 60px;
    }

    .control-btn{
        width:60px;
        height:60px;
        font-size:26px;
    }
}
</style>
</head>

<body>

<div id="game">
    <h1>Nuestra historia en un año ❤️</h1>

    <div id="world">
        <div class="path" style="left:390px; top:220px; height:1750px;"></div>

        <img id="player" src="girlfriend.png" alt="Girlfriend">

        <div id="monthsContainer"></div>
    </div>

    <div id="message"></div>

    <div id="hint">
        Muévete hasta una cámara 📸 para abrir un recuerdo.
    </div>

    <div id="controls">
        <div class="empty"></div>
        <button class="control-btn" onclick="movePlayer('up')">⬆️</button>
        <div class="empty"></div>

        <button class="control-btn" onclick="movePlayer('left')">⬅️</button>
        <button class="control-btn" onclick="movePlayer('down')">⬇️</button>
        <button class="control-btn" onclick="movePlayer('right')">➡️</button>
    </div>
</div>

<script>
const game = document.getElementById("game");
const world = document.getElementById("world");
const player = document.getElementById("player");
const monthsContainer = document.getElementById("monthsContainer");
const message = document.getElementById("message");

const music = new Audio("cielo_danish.mp3");
music.loop = true;
music.volume = 0.6;
let musicStarted = false;

let x = 250;
let y = 220;
const speed = 18;
const worldWidth = 2000;
const worldHeight = 2200;

const memories = [
    {
        id:"junio2024",
        label:"📸 Junio 2025",
        x:520,
        y:250,
        photos:["june-2024_1.jpeg", "june-2024_2.jpeg", "june-2024_3.jpeg"],
        text:`Este fue uno de los primeros capítulos de nuestra historia. Todavía no sabía todo lo que íbamos a vivir, pero desde este mes empezaste a volverte alguien muy especial para mí.`
    },
    {
        id:"julio2024",
        label:"📸 Julio 2025",
        x:230,
        y:390,
        photos:["july-2025_1.jpeg", "july-2025_2.jpeg", "july-2025_3.jpeg"],
        text:`Julio fue otro pedacito bonito de nuestra historia. Otro mes más descubriendo cosas de ti, compartiendo momentos, y sintiendo que cada vez me gustaba más estar contigo.`
    },
    {
        id:"agosto2024",
        label:"📸 Agosto 2025",
        x:530,
        y:540,
        photos:["ago-2025_1.jpeg", "ago-2025_2.jpeg", "ago-2025_3.jpeg"],
        text:`Aquí escribe el recuerdo de Agosto 2024.`
    },
    {
        id:"septiembre2024",
        label:"📸 Septiembre 2025",
        x:220,
        y:690,
        photos:["sept-2025_1.jpeg", "sept-2025_2.jpeg", "sept-2025_3.jpeg"],
        text:`Aquí escribe el recuerdo de Septiembre 2024.`
    },
    {
        id:"octubre2024",
        label:"📸 Octubre 2025",
        x:540,
        y:840,
        photos:["oct-2025_1.jpeg", "oct-2025_2.jpeg", "oct-2025_3.jpeg"],
        text:`Aquí escribe el recuerdo de Octubre 2024.`
    },
    {
        id:"noviembre2024",
        label:"📸 Noviembre 2025",
        x:215,
        y:990,
        photos:["nov-2025_1.jpeg", "nov-2025_2.jpeg", "nov-2025_3.jpeg"],
        text:`Aquí escribe el recuerdo de Noviembre 2024.`
    },
    {
        id:"diciembre2024",
        label:"📸 Diciembre 2025",
        x:535,
        y:1140,
        photos:["dic-2025_1.jpeg", "dic-2025_2.jpeg", "dic-2025_3.jpeg"],
        text:`Aquí escribe el recuerdo de Diciembre 2024.`
    },
    {
        id:"enero2025",
        label:"📸 Enero 2026",
        x:230,
        y:1290,
        photos:["jan-2026_1.jpeg", "jan-202_2.jpeg", "jan-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Enero 2025.`
    },
    {
        id:"febrero2025",
        label:"📸 Febrero 2026",
        x:540,
        y:1440,
        photos:["feb-2026_1.jpeg", "feb-2026_2.jpeg", "feb-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Febrero 2025.`
    },
    {
        id:"marzo2025",
        label:"📸 Marzo 2026",
        x:220,
        y:1590,
        photos:["marz-2026_1.jpeg", "marz-2026_2.jpeg", "marz-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Marzo 2025.`
    },
    {
        id:"abril2025",
        label:"📸 Abril 2026",
        x:535,
        y:1740,
        photos:["apr-2026_1.jpeg", "apr-2026_2.jpeg", "apr-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Abril 2025.`
    },
    {
        id:"mayo2025",
        label:"📸 Mayo 2026",
        x:220,
        y:1890,
        photos:["may-2026_1.jpeg", "may-2026_2.jpeg", "may-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Mayo 2025.`
    },
    {
        id:"junio2025",
        label:"📸 Junio 2026",
        x:535,
        y:2020,
        photos:["june-2026_1.jpeg", "june-2026_2.jpeg", "june-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Junio 2025.`
    },
    {
        id:"julio2025",
        label:"❤️ Julio 2026",
        x:220,
        y:2100,
        photos:["july-2026_1.jpeg", "july-2026_2.jpeg", "july-2026_3.jpeg"],
        text:`Aquí escribe el recuerdo de Julio 2025. Este puede ser el cierre del primer año: gracias por vivir este capítulo conmigo.`
    }
];

let currentMemory = null;

createMonths();
updatePlayer();
updateCamera();

function createMonths(){
    memories.forEach(memory => {
        const div = document.createElement("div");
        div.className = "month";
        div.id = memory.id;
        div.style.left = memory.x + "px";
        div.style.top = memory.y + "px";
        div.innerHTML = memory.label;
        monthsContainer.appendChild(div);
    });
}

document.addEventListener("keydown", function(event){
    if(event.key === "ArrowLeft") movePlayer("left");
    if(event.key === "ArrowRight") movePlayer("right");
    if(event.key === "ArrowUp") movePlayer("up");
    if(event.key === "ArrowDown") movePlayer("down");
});

function startMusic(){
    if(!musicStarted){
        music.play().catch(() => {});
        musicStarted = true;
    }
}

function movePlayer(direction){
    startMusic();

    if(direction === "left") x -= speed;
    if(direction === "right") x += speed;
    if(direction === "up") y -= speed;
    if(direction === "down") y += speed;

    x = Math.max(0, Math.min(worldWidth - player.offsetWidth, x));
    y = Math.max(70, Math.min(worldHeight - player.offsetHeight, y));

    updatePlayer();
    updateCamera();
    checkCollision();
}

function updatePlayer(){
    player.style.left = x + "px";
    player.style.top = y + "px";
}

function updateCamera(){
    const gameWidth = game.clientWidth;
    const gameHeight = game.clientHeight;

    let cameraX = x + player.offsetWidth / 2 - gameWidth / 2;
    let cameraY = y + player.offsetHeight / 2 - gameHeight / 2;

    cameraX = Math.max(0, Math.min(worldWidth - gameWidth, cameraX));
    cameraY = Math.max(0, Math.min(worldHeight - gameHeight, cameraY));

    world.style.transform = `translate(${-cameraX}px, ${-cameraY}px)`;
}

function checkCollision(){
    memories.forEach(memory => {
        const month = document.getElementById(memory.id);

        const playerBox = {
            left: x,
            right: x + player.offsetWidth,
            top: y,
            bottom: y + player.offsetHeight
        };

        const monthBox = {
            left: memory.x,
            right: memory.x + month.offsetWidth,
            top: memory.y,
            bottom: memory.y + month.offsetHeight
        };

        const touching = !(
            playerBox.right < monthBox.left ||
            playerBox.left > monthBox.right ||
            playerBox.bottom < monthBox.top ||
            playerBox.top > monthBox.bottom
        );

        if(touching && currentMemory !== memory.id){
            openMemory(memory);
        }
    });
}

function openMemory(memory){
    currentMemory = memory.id;

    message.innerHTML = `
        <h2>${memory.label}</h2>

        <div class="gallery">
            <img src="${memory.photos[0]}" alt="${memory.label} foto 1">
            <img src="${memory.photos[1]}" alt="${memory.label} foto 2">
            <img src="${memory.photos[2]}" alt="${memory.label} foto 3">
        </div>

        <p>${memory.text}</p>

        <button id="closeBtn" onclick="closeMemory()">Cerrar</button>
    `;

    message.style.display = "block";
}

function closeMemory(){
    message.style.display = "none";
}
</script>

</body>
</html>
