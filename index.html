<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Story of Us ❤️</title>

<style>
body{
    margin:0;
    background:#ffb6c1;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

#game{
    position:relative;
    width:800px;
    height:600px;
    background:#ffe4ec;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255, 105, 180, 0.6);
}

h1{
    text-align:center;
    font-family:monospace;
    font-weight:normal;
    color:#5c1a35;
}

#player{
    position:absolute;
    left:100px;
    top:260px;
    height:120px;
    width:auto;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.25);
    z-index:5;
}

#star{
    position:absolute;
    left:600px;
    top:300px;
    width:38px;
    height:38px;
    background:#ffeb3b;
    border-radius:50%;
    box-shadow:0 0 18px rgba(255, 235, 59, 0.9);
}

.heart{
    position:absolute;
    color:#ff5c8a;
    font-size:24px;
    animation:float 6s infinite ease-in-out;
    opacity:0.7;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:0.4;
    }
    50%{
        transform:translateY(-25px);
        opacity:1;
    }
    100%{
        transform:translateY(0);
        opacity:0.4;
    }
}

#message{
    position:absolute;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:18px;
    border-radius:15px;
    display:none;
    max-width:500px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    z-index:10;
    color:#5c1a35;
}
</style>
</head>

<body>

<div id="game">

    <h1>The Story of Us ❤️</h1>

    <div class="heart" style="left:80px; top:90px;">❤️</div>
    <div class="heart" style="left:700px; top:120px;">💕</div>
    <div class="heart" style="left:170px; top:480px;">💖</div>
    <div class="heart" style="left:650px; top:470px;">💗</div>

    <img id="player" src="girlfriend.png" alt="Girlfriend">

    <div id="star"></div>

    <div id="message">
        <h2>❤️ Primer recuerdo</h2>
        <p>
            Aquí irá una foto, un recuerdo o una carta.
        </p>
        <p>
            "Ese día no sabía que ibas a convertirte en mi persona favorita."
        </p>
    </div>

</div>

<script>
const player = document.getElementById("player");
const star = document.getElementById("star");
const message = document.getElementById("message");

let x = 100;
let y = 260;
const speed = 15;

document.addEventListener("keydown", function(event){

    switch(event.key){

        case "ArrowLeft":
            x -= speed;
            break;

        case "ArrowRight":
            x += speed;
            break;

        case "ArrowUp":
            y -= speed;
            break;

        case "ArrowDown":
            y += speed;
            break;
    }

    x = Math.max(0, Math.min(800 - player.offsetWidth, x));
    y = Math.max(50, Math.min(600 - player.offsetHeight, y));

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollision();
});

function checkCollision(){

    const p = player.getBoundingClientRect();
    const s = star.getBoundingClientRect();

    const touching = !(
        p.right < s.left ||
        p.left > s.right ||
        p.bottom < s.top ||
        p.top > s.bottom
    );

    if(touching){
        message.style.display = "block";
        star.style.display = "none";
    }
}
</script>

</body>
</html>
