<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Story of Us ❤️</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

#game{
    position:relative;
    width:800px;
    height:600px;
    background:#eeeeee;
    overflow:hidden;
}

h1{
    text-align:center;
    margin-top:15px;
    font-family:monospace;
    font-weight:normal;
}

#player{
    position:absolute;
    left:100px;
    top:300px;
    height:120px;
    width:auto;
    border-radius:10px;
}

#star{
    position:absolute;
    left:600px;
    top:300px;
    width:32px;
    height:32px;
    background:yellow;
    border-radius:50%;
}

#message{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:15px;
    border-radius:10px;
    display:none;
    max-width:500px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    z-index:10;
}
</style>
</head>

<body>

<div id="game">
    <h1>The Story of Us ❤️</h1>

    <img id="player" src="assets/girlfriend.png">

    <div id="star"></div>

    <div id="message">
        <h2>❤️ First Memory</h2>
        <p>
            This is where you can put a photo,
            a memory, or a romantic message.
        </p>
        <p>
            "That day I didn't know you would become my favorite person."
        </p>
    </div>
</div>

<script>
const player = document.getElementById("player");
const star = document.getElementById("star");
const message = document.getElementById("message");

let x = 100;
let y = 300;
const speed = 10;

document.addEventListener("keydown", function(event){

    if(event.key === "ArrowLeft"){
        x -= speed;
    }

    if(event.key === "ArrowRight"){
        x += speed;
    }

    if(event.key === "ArrowUp"){
        y -= speed;
    }

    if(event.key === "ArrowDown"){
        y += speed;
    }

    x = Math.max(0, Math.min(800 - player.offsetWidth, x));
    y = Math.max(50, Math.min(600 - player.offsetHeight, y));

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollision();
});

function checkCollision(){
    const p = player.getBoundingClientRect();
    const s = star.getBoundingClientRect();

    const touching = !(
        p.right < s.left ||
        p.left > s.right ||
        p.bottom < s.top ||
        p.top > s.bottom
    );

    if(touching){
        message.style.display = "block";
        star.style.display = "none";
    }
}
</script>

</body>
</html>
