<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Story of Us ❤️</title>

<style>
body{
    margin:0;
    background:#ffb6c1;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

#game{
    position:relative;
    width:800px;
    height:600px;
    background:#ffe4ec;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255, 105, 180, 0.6);
}

h1{
    text-align:center;
    font-family:monospace;
    font-weight:normal;
    color:#5c1a35;
}

#player{
    position:absolute;
    left:100px;
    top:260px;
    height:120px;
    width:auto;
    border-radius:15px;
    border:4px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.8);
    z-index:5;
}

.month{
    position:absolute;
    width:130px;
    height:60px;
    background:white;
    border:3px solid #ff6fa5;
    border-radius:15px;
    color:#5c1a35;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    box-shadow:0 0 15px rgba(255,105,180,0.5);
}

#june2024{
    left:560px;
    top:280px;
}

#message{
    position:absolute;
    top:50px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:18px;
    border-radius:15px;
    display:none;
    width:620px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    z-index:10;
    color:#5c1a35;
    text-align:center;
}

.gallery{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:12px 0;
}

.gallery img{
    height:120px;
    width:120px;
    object-fit:cover;
    border-radius:12px;
    border:3px solid #ffd6e7;
}

#closeBtn{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    background:#ff6fa5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#controls{
    position:absolute;
    bottom:20px;
    right:20px;
    display:grid;
    grid-template-columns:70px 70px 70px;
    gap:6px;
    z-index:999;
}

.control-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:15px;
    background:#ff6fa5;
    color:white;
    font-size:30px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    cursor:pointer;
}

.control-btn:active{
    transform:scale(0.95);
    background:#ff4f8f;
}

.empty{
    visibility:hidden;
}
</style>
</head>

<body>

<div id="game">

    <h1>The Story of Us ❤️</h1>

    <img id="player" src="girlfriend.png" alt="Girlfriend">

    <div id="june2024" class="month">
        Junio 2024
    </div>

    <div id="message">
        <h2>Junio 2024 ❤️</h2>

        <div class="gallery">
            <img src="june-2024_1.jpeg">
            <img src="june-2024_2.jpeg">
        </div>

        <p>
            Este fue uno de los primeros capítulos de nuestra historia.
            Todavía no sabía todo lo que íbamos a vivir, pero desde este mes
            empezaste a volverte alguien muy especial para mí.
        </p>

        <button id="closeBtn" onclick="closeMemory()">Cerrar</button>
    </div>

    <div id="controls">
        <div class="empty"></div>
        <button class="control-btn" onclick="movePlayer('up')">⬆️</button>
        <div class="empty"></div>

        <button class="control-btn" onclick="movePlayer('left')">⬅️</button>
        <button class="control-btn" onclick="movePlayer('down')">⬇️</button>
        <button class="control-btn" onclick="movePlayer('right')">➡️</button>
    </div>

</div>

<script>
const player = document.getElementById("player");
const june2024 = document.getElementById("june2024");
const message = document.getElementById("message");

const music = new Audio("just_the_way.mp3");
music.loop = true;
music.volume = 0.6;

let musicStarted = false;
let juneOpened = false;

let x = 100;
let y = 260;
const speed = 15;

document.addEventListener("keydown", function(event){

    if(event.key === "ArrowLeft"){
        movePlayer("left");
    }

    if(event.key === "ArrowRight"){
        movePlayer("right");
    }

    if(event.key === "ArrowUp"){
        movePlayer("up");
    }

    if(event.key === "ArrowDown"){
        movePlayer("down");
    }
});

function startMusic(){
    if(!musicStarted){
        music.play();
        musicStarted = true;
    }
}

function movePlayer(direction){

    startMusic();

    if(direction === "left"){
        x -= speed;
    }

    if(direction === "right"){
        x += speed;
    }

    if(direction === "up"){
        y -= speed;
    }

    if(direction === "down"){
        y += speed;
    }

    x = Math.max(0, Math.min(800 - player.offsetWidth, x));
    y = Math.max(50, Math.min(600 - player.offsetHeight, y));

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollision();
}

function checkCollision(){

    const p = player.getBoundingClientRect();
    const j = june2024.getBoundingClientRect();

    const touchingJune = !(
        p.right < j.left ||
        p.left > j.right ||
        p.bottom < j.top ||
        p.top > j.bottom
    );

    if(touchingJune && !juneOpened){
        message.style.display = "block";
        juneOpened = true;
    }
}

function closeMemory(){
    message.style.display = "none";
}
</script>

</body>
</html>
