<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Story of Us ❤️</title>

<style>
body{
    margin:0;
    background:#ffb6c1;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

#game{
    position:relative;
    width:800px;
    height:600px;
    background:#ffe4ec;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255, 105, 180, 0.6);
}

h1{
    text-align:center;
    font-family:monospace;
    font-weight:normal;
    color:#5c1a35;
}

#player{
    position:absolute;
    left:100px;
    top:260px;
    height:120px;
    width:auto;
    border-radius:15px;
    border:4px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.8);
    z-index:5;
}

.month{
    position:absolute;
    width:150px;
    height:60px;
    background:white;
    border:3px solid #ff6fa5;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:#5c1a35;
    box-shadow:0 0 15px rgba(255,105,180,0.4);
    z-index:4;
}

.month:hover{
    transform:scale(1.05);
}

#message{
    position:absolute;
    top:45px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:18px;
    border-radius:15px;
    display:none;
    width:620px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    z-index:1000;
    color:#5c1a35;
    text-align:center;
}

.gallery{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:15px 0;
}

.gallery img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    border:3px solid #ffd6e7;
}

#closeBtn{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    background:#ff6fa5;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#closeBtn:hover{
    background:#ff4f8f;
}

#controls{
    position:absolute;
    bottom:20px;
    right:20px;
    display:grid;
    grid-template-columns:70px 70px 70px;
    gap:6px;
    z-index:999;
}

.control-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:15px;
    background:#ff6fa5;
    color:white;
    font-size:30px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    cursor:pointer;
}

.control-btn:active{
    transform:scale(0.95);
    background:#ff4f8f;
}

.empty{
    visibility:hidden;
}

#hint{
    position:absolute;
    left:20px;
    bottom:20px;
    color:#5c1a35;
    background:rgba(255,255,255,0.65);
    padding:10px 14px;
    border-radius:12px;
    font-size:14px;
}
</style>
</head>

<body>

<div id="game">

    <h1>The Story of Us ❤️</h1>

    <img id="player" src="girlfriend.png" alt="Girlfriend">

    <div id="monthsContainer"></div>

    <div id="message"></div>

    <div id="hint">
        Muévete hacia una cámara 📸 para abrir un recuerdo.
    </div>

    <div id="controls">
        <div class="empty"></div>
        <button class="control-btn" onclick="movePlayer('up')">⬆️</button>
        <div class="empty"></div>

        <button class="control-btn" onclick="movePlayer('left')">⬅️</button>
        <button class="control-btn" onclick="movePlayer('down')">⬇️</button>
        <button class="control-btn" onclick="movePlayer('right')">➡️</button>
    </div>

</div>

<script>
const player = document.getElementById("player");
const message = document.getElementById("message");
const monthsContainer = document.getElementById("monthsContainer");

const music = new Audio("just_the_way.mp3");
music.loop = true;
music.volume = 0.6;

let musicStarted = false;
let currentMemory = null;

let x = 100;
let y = 260;
const speed = 15;

// Add more months here later.
// Just copy one block and change id, label, x, y, photos, and text.
const memories = [
    {
        id: "june2024",
        label: "📸 Junio 2024",
        x: 560,
        y: 250,
        photos: [
            "junio2024_1.jpg",
            "junio2024_2.jpg",
            "junio2024_3.jpg"
        ],
        text: `
            Este fue uno de los primeros capítulos de nuestra historia.
            Todavía no sabía todo lo que íbamos a vivir, pero desde este mes
            empezaste a volverte alguien muy especial para mí.
        `
    },
    {
        id: "july2024",
        label: "📸 Julio 2024",
        x: 260,
        y: 420,
        photos: [
            "julio2025_1.jpg",
            "julio2025_2.jpg",
            "julio2025_3.jpg"
        ],
        text: `
            Julio fue otro pedacito bonito de nuestra historia.
            Otro mes descubriendo cosas de ti, compartiendo momentos,
            y sintiendo que cada vez me gustaba más estar contigo.
        `
    }
];

memories.forEach(memory => {
    const div = document.createElement("div");
    div.className = "month";
    div.id = memory.id;
    div.style.left = memory.x + "px";
    div.style.top = memory.y + "px";
    div.innerHTML = memory.label;
    monthsContainer.appendChild(div);
});

document.addEventListener("keydown", function(event){
    if(event.key === "ArrowLeft"){
        movePlayer("left");
    }

    if(event.key === "ArrowRight"){
        movePlayer("right");
    }

    if(event.key === "ArrowUp"){
        movePlayer("up");
    }

    if(event.key === "ArrowDown"){
        movePlayer("down");
    }
});

function startMusic(){
    if(!musicStarted){
        music.play().catch(() => {
            console.log("Music could not start yet.");
        });
        musicStarted = true;
    }
}

function movePlayer(direction){
    startMusic();

    if(direction === "left"){
        x -= speed;
    }

    if(direction === "right"){
        x += speed;
    }

    if(direction === "up"){
        y -= speed;
    }

    if(direction === "down"){
        y += speed;
    }

    x = Math.max(0, Math.min(800 - player.offsetWidth, x));
    y = Math.max(50, Math.min(600 - player.offsetHeight, y));

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollision();
}

function checkCollision(){
    const p = player.getBoundingClientRect();

    memories.forEach(memory => {
        const monthElement = document.getElementById(memory.id);
        const m = monthElement.getBoundingClientRect();

        const touching = !(
            p.right < m.left ||
            p.left > m.right ||
            p.bottom < m.top ||
            p.top > m.bottom
        );

        if(touching && currentMemory !== memory.id){
            openMemory(memory);
        }
    });
}

function openMemory(memory){
    currentMemory = memory.id;

    message.innerHTML = `
        <h2>${memory.label}</h2>

        <div class="gallery">
            <img src="${memory.photos[0]}" alt="Foto 1">
            <img src="${memory.photos[1]}" alt="Foto 2">
            <img src="${memory.photos[2]}" alt="Foto 3">
        </div>

        <p>${memory.text}</p>

        <button id="closeBtn" onclick="closeMemory()">Cerrar</button>
    `;

    message.style.display = "block";
}

function closeMemory(){
    message.style.display = "none";
}
</script>

</body>
</html>
